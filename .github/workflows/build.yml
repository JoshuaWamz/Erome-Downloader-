name: Build Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create platform folders with correct project name
        run: flutter create --project-name=erome_downloader_ . --platforms=android

      # ========== SET MIN SDK TO ANDROID 15 (API 35) ==========
      - name: Set minSdk and targetSdk to 35
        run: |
          sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 35/' android/app/build.gradle

      # ========== FORCE GRADLE WRAPPER TO 8.3 ==========
      - name: Force Gradle wrapper to 8.3
        run: |
          # Directly set the distribution URL in gradle-wrapper.properties
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          echo "Updated gradle-wrapper.properties:"
          cat android/gradle/wrapper/gradle-wrapper.properties
          # Make gradlew executable
          chmod +x android/gradlew

      # ========== UPDATE ANDROID GRADLE PLUGIN (AGP) IN SETTINGS.GRADLE ==========
      - name: Update AGP in settings.gradle (modern format)
        run: |
          sed -i 's/id "com\.android\.application" version "[^"]*"/id "com.android.application" version "8.2.2"/' android/settings.gradle
          sed -i 's/id "com\.android\.library" version "[^"]*"/id "com.android.library" version "8.2.2"/' android/settings.gradle

      # ========== UPDATE AGP IN BUILD.GRADLE (LEGACY FALLBACK) ==========
      - name: Update AGP in build.gradle (legacy)
        run: |
          if grep -q "classpath ['\"]com.android.tools.build:gradle" android/build.gradle; then
            sed -i "s/classpath ['\"]com.android.tools.build:gradle:[0-9]\+\.[0-9]\+\.[0-9]\+['\"]/classpath 'com.android.tools.build:gradle:8.2.2'/" android/build.gradle
          fi

      # ========== FIX KOTLIN VERSION (use latest 2.3.10) ==========
      - name: Update Kotlin in settings.gradle (plugin block)
        run: |
          sed -i 's/id "org\.jetbrains\.kotlin\.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.3.10"/' android/settings.gradle

      - name: Update Kotlin in build.gradle (legacy)
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "2.3.10"/' android/build.gradle || true

      # ========== INSTALL DEPENDENCIES ==========
      - name: Install dependencies
        run: flutter pub get

      # ========== CUSTOM ICON & APP NAME ==========
      - name: Copy custom icon (if exists)
        run: |
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "Custom icon applied."
          else
            echo "No custom icon found – using default Flutter icon."
          fi

      - name: Change app display name
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="Erome Downloader"/' "$MANIFEST"

      # ========== FOREGROUND SERVICE PERMISSIONS ==========
      - name: Add foreground service permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />' "$MANIFEST"

      # ========== NETWORK SECURITY CONFIG ==========
      - name: Add networkSecurityConfig attribute to <application>
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"

      - name: Create network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">erome.com</domain>
                  <domain includeSubdomains="true">cdn.erome.com</domain>
              </domain-config>
          </network-security-config>
          EOF

      # ========== BUILD ==========
      - name: Build split APKs
        run: flutter build apk --split-per-abi

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

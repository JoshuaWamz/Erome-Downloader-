name: Build Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create platform folders
        run: flutter create . --platforms=android

      # Add foreground service permissions
      - name: Add foreground service permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />' "$MANIFEST"

      # Add network security config
      - name: Add network security config to application tag
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">erome.com</domain>
                  <domain includeSubdomains="true">cdn.erome.com</domain>
              </domain-config>
          </network-security-config>
          EOF

      # Install dependencies and build
      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        run: flutter build apk --split-per-abi

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

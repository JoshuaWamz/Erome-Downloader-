name: erome_downloader_
description: An in-app browser and downloader for Erome albums.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Networking & parsing
  dio: ^5.7.0
  http: ^0.13.6
  html: ^0.15.5

  # Browser
  flutter_inappwebview: ^6.1.5

  # Storage & permissions
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  gal: ^2.2.0   # <-- changed from gallery_saver

  # State management
  provider: ^6.1.2

  # Background tasks
  flutter_foreground_task: ^8.0.0

  # Utilities
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
